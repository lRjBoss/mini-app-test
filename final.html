    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            color: #333;
            text-align: center;
        }
        header {
            background: #2980b9; 
            color: #fff;
            padding: 20px;
            font-size: 26px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 700px;
            margin: 30px auto;
            padding: 30px 20px;
            background: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-radius: 12px;
        }
        h1 {
            color: #2c3e50;
            font-size: 26px;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        /* --- AD PLACEMENT BOXES --- */
        .ad-container {
            margin: 25px auto;
            padding: 10px;
            background: #fdfdfd;
            border: 1px dashed #bdc3c7;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* --- ANIMATED CIRCLE TIMER --- */
        .loader-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 40px auto;
        }
        /* The spinning ring */
        .spinner {
            width: 100%;
            height: 100%;
            border: 8px solid #ecf0f1;
            border-top: 8px solid #2980b9;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            box-sizing: border-box;
        }
        /* The number inside */
        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            color: #2980b9;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-msg {
            color: #2980b9;
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* --- FINAL GET FILE BUTTON --- */
        #final-btn-container {
            display: none;
            margin: 40px 0;
        }
        .get-file-btn {
            display: inline-block;
            padding: 18px 40px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 8px 15px rgba(39, 174, 96, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
        .get-file-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 20px rgba(39, 174, 96, 0.4);
        }
    </style>
</head>
<body>

    <header>TechZon Secure Cloud</header>

    <div class="container">
        
        <h1>Your Link is Almost Ready!</h1>
        <p class="subtitle">Our servers are generating a secure 🔐 link for you.</p>

        <!-- NATIVE BANNER 1 (TOP) -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://pl29903115.effectivecpmnetwork.com/2e4f2de37171ed2a68c344b39b3ece77/invoke.js"></script>
            <div id="container-2e4f2de37171ed2a68c344b39b3ece77"></div>
        </div>

        <!-- ANIMATED CIRCLE & TIMER -->
        <div id="timer-section">
            <div class="loader-wrapper">
                <div class="spinner"></div>
                <div class="timer-text" id="countdown">5</div>
            </div>
            <div class="loading-msg">Generating URL 🔗</div>
        </div>

        <!-- FINAL BUTTON (Appears after timer) -->
        <div id="final-btn-container">
            <button class="get-file-btn" id="get-file-btn">🎯 Get File</button>
        </div>

        <!-- NORMAL BANNER (MIDDLE) -->
        <div class="ad-container">
            <script>
              atOptions = {
                'key' : '78390246d6bef9e268e5f36b76428c74',
                'format' : 'iframe',
                'height' : 250,
                'width' : 300,
                'params' : {}
              };
            </script>
            <script src="https://www.highperformanceformat.com/78390246d6bef9e268e5f36b76428c74/invoke.js"></script>
        </div>

        <!-- NATIVE BANNER 2 (BOTTOM) -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://pl29903115.effectivecpmnetwork.com/2e4f2de37171ed2a68c344b39b3ece77/invoke.js"></script>
            <div id="container-2e4f2de37171ed2a68c344b39b3ece77"></div>
        </div>

    </div>

    <!-- ADSTERRA SOCIAL BAR SCRIPT (Will show floating notifications automatically) -->
    <script src="https://pl29903117.effectivecpmnetwork.com/dc/6d/23/dc6d23d6bce04a6565b8d772687dc70b.js"></script>

    <script>
        // ============================================
        // FINAL PAGE - IST DATE CALCULATION + VERIFICATION
        // ============================================

        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Read token from sessionStorage
        let startParam = sessionStorage.getItem('fullToken') || "";

        console.log("Final Page - Full Token:", startParam);

        // Parse token: {RandomNumber}_{SecretCode}_{TrapFlag}
        // Example: 82_k9Mw2_X or 156_aB3dE_A
        let tokenParts = startParam.split('_');
        let randomNumber = 0;
        let secretCode = "";

        if (tokenParts.length >= 2) {
            randomNumber = parseInt(tokenParts[0]);
            // SecretCode is always the second part (5 characters)
            secretCode = tokenParts[1];
        }

        console.log("Random Number:", randomNumber);
        console.log("Secret Code:", secretCode);

        // Get IST Date (1-31)
        function getISTDate() {
            const now = new Date();
            const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
            const istTime = new Date(utcTime + (3600000 * 5.5)); // IST = UTC+5:30
            return istTime.getDate(); // Returns 1-31
        }

        // Calculate payload
        let istDate = getISTDate();
        let multipliedNumber = randomNumber * istDate;
        let payload = multipliedNumber + "_" + secretCode;

        console.log("IST Date:", istDate);
        console.log("Multiplied Number:", multipliedNumber);
        console.log("Final Payload:", payload);

        // --- AUTO-START SLOW TIMER LOGIC (1 sec = 1.2 sec) --- //
        
        // This ensures the timer only starts when the entire page (including ads) has loaded
        window.onload = function() {
            let timeLeft = 5;
            const countdownEl = document.getElementById('countdown');
            const timerSection = document.getElementById('timer-section');
            const finalBtnContainer = document.getElementById('final-btn-container');

            const interval = setInterval(() => {
                timeLeft--;
                
                if (timeLeft > 0) {
                    countdownEl.innerText = timeLeft;
                } else if (timeLeft === 0) {
                    countdownEl.innerText = "0";
                } else {
                    // Stop timer and switch UI
                    clearInterval(interval);
                    timerSection.style.display = 'none'; // Hide the spinning circle
                    finalBtnContainer.style.display = 'block'; // Show the final button
                }
            }, 1200); // 1200ms = 1.2 seconds per tick
        };

        // Get File Button Click Handler
        document.addEventListener('DOMContentLoaded', function() {
            const finalBtn = document.getElementById('get-file-btn');
            
            if (finalBtn) {
                finalBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    console.log("Sending payload to bot:", payload);
                    
                    // Send data to bot
                    tg.sendData(payload);
                    
                    // Show confirmation
                    finalBtn.innerText = "✅ Sent! Closing...";
                    finalBtn.style.background = "#27ae60";
                    
                    // Close WebApp after 1 second
                    setTimeout(() => {
                        tg.close();
                    }, 1000);
                });
            }
        });
    </script>
</body>
</html>
