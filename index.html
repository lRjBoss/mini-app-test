<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1 - Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1e1e1e; color: white; text-align: center; padding: 20px; margin: 0; }
        .header { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .ad-space { background: #2c2c2c; padding: 10px; margin: 20px auto; border: 1px dashed #555; border-radius: 8px; width: 320px; min-height: 250px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .btn { background: #0088cc; color: white; padding: 15px; width: 90%; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 10px auto; display: block; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .btn.success { background: #4CAF50; }
        .spacer { height: 60vh; }
    </style>
</head>
<body>

    <div class="header">🔒 Step 1: Verification</div>
    <p style="color: #aaa; font-size: 14px;">Click the button below to verify.</p>

    <div class="ad-space" style="border: none; background: transparent;">
        <script async="async" data-cfasync="false" src="https://pl29903115.effectivecpmnetwork.com/2e4f2de37171ed2a68c344b39b3ece77/invoke.js"></script>
        <div id="container-2e4f2de37171ed2a68c344b39b3ece77"></div>
    </div>

    <button id="verifyBtn" class="btn" onclick="startTimer()">🤖 Click to Verify</button>

    <div class="spacer">
        <p style="color: #444; margin-top: 50px;">Scroll down...</p>
    </div>

    <div class="ad-space">
        <script>
          atOptions = {
            'key' : '78390246d6bef9e268e5f36b76428c74',
            'format' : 'iframe',
            'height' : 250,
            'width' : 300,
            'params' : {}
          };
        </script>
        <script src="https://www.highperformanceformat.com/78390246d6bef9e268e5f36b76428c74/invoke.js"></script>
    </div>

    <div class="ad-space">
        <script>
          atOptions = {
            'key' : '78390246d6bef9e268e5f36b76428c74',
            'format' : 'iframe',
            'height' : 250,
            'width' : 300,
            'params' : {}
          };
        </script>
        <script src="https://www.highperformanceformat.com/78390246d6bef9e268e5f36b76428c74/invoke.js"></script>
    </div>

    <button id="nextBtn" class="btn" disabled onclick="window.location.href='final.html'" style="margin-bottom: 40px; opacity: 0.5;">Next Step ➔</button>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        function startTimer() {
            let vBtn = document.getElementById("verifyBtn");
            let nBtn = document.getElementById("nextBtn");
            let timeLeft = 5;
            
            vBtn.disabled = true;

            let timerInterval = setInterval(function() {
                vBtn.innerText = "⏳ Please wait " + timeLeft + "s...";
                timeLeft--;

                if(timeLeft < 0) {
                    clearInterval(timerInterval);
                    vBtn.innerText = "✅ Verified Successfully!";
                    vBtn.classList.add("success");
                    
                    nBtn.disabled = false;
                    nBtn.style.opacity = "1";
                    
                    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
                    }

                    setTimeout(() => {
                        nBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 500);
                }
            }, 1000);
        }
    </script>
</body>
</html>
